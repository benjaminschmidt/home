---
name: Pull request pipeline
on:
  pull_request:
    branches:
      - main

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7.0.0
      - id: filter
        uses: https://github.com/dorny/paths-filter@v4.0.1
        with:
          filters: |
            api:
              - 'api/**'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            workflow:
              - '.forgejo/workflows/pull-request.yaml'
  run-backend-tests:
    needs: [ changes ]
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-rootless-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7.0.0
      - name: Restore Maven cache
        uses: actions/cache@v6.0.0
        with:
          key: maven-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          path: ~/.m2/repository
          restore-keys: |
            maven-${{ runner.os }}-
      - name: Set up mise
        uses: https://github.com/jdx/mise-action@v4.2.0
        with:
          working_directory: backend
          github_token: ${{ secrets.TOKEN_GITHUB }}
      - name: Run backend tests
        run: mise //backend:ci
  run-frontend-tests:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7.0.0
      - name: Restore pnpm cache
        uses: actions/cache@v6.0.0
        with:
          key: pnpm-${{ runner.os }}-${{ hashFiles('api/pnpm-lock.yaml', 'frontend/pnpm-lock.yaml') }}
          path: .pnpm-store
          restore-keys: |
            pnpm-${{ runner.os }}-
      - name: Set up mise
        uses: https://github.com/jdx/mise-action@v4.2.0
        with:
          working_directory: frontend
          github_token: ${{ secrets.TOKEN_GITHUB }}
      - name: Run frontend tests
        run: CI=true mise //frontend:ci
  check-commit-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Obtain next version
        uses: https://forgejo.fuzzyhome.net/phaib/simple-semantic-release@1.3.5
        with:
          create-release: false
