---
name: Release pipeline
on:
  push:
    branches:
      - main

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Obtain next version
        uses: https://forgejo.fuzzyhome.net/phaib/simple-semantic-release@1.3.4
        with:
          create-release: true
          token: ${{ secrets.REPO_TOKEN }}
